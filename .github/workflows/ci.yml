name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Ubuntu / Node ${{ matrix.node }} — full verification
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.12.0", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify committed CycloneDX SBOM
        run: pnpm security:sbom:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Fault-injection and recovery tests
        run: pnpm test:faults

      - name: Semantic memory quality gate
        run: pnpm quality:semantic

      - name: Packed npm artifact smoke
        run: pnpm smoke:package

  platform-lifecycle:
    name: ${{ matrix.os }} / Node ${{ matrix.node }} — lifecycle contract
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["22.12.0", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify committed CycloneDX SBOM
        run: pnpm security:sbom:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Portable lifecycle tests
        run: pnpm test:platform

      - name: Semantic memory quality gate
        run: pnpm quality:semantic

      - name: Packed npm artifact smoke
        run: pnpm smoke:package

  website:
    name: Ubuntu / Node 24 — website verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Website typecheck
        run: pnpm website:typecheck

      - name: Website build
        run: pnpm website:build

      - name: Install Playwright browser
        run: pnpm --dir website exec playwright install --with-deps chromium

      - name: Website end-to-end tests
        run: pnpm website:test:e2e
