name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Node ${{ matrix.node }} — install, build, and test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.12.0", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Packed npm artifact smoke
        run: pnpm smoke:package

      - name: Website typecheck
        run: pnpm website:typecheck

      - name: Website build
        run: pnpm website:build

      - name: Install Playwright browser
        run: pnpm --dir website exec playwright install --with-deps chromium

      - name: Website end-to-end tests
        run: pnpm website:test:e2e
